# ── OpenMath Production Stack ────────────────────────────────
# Usage:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#         docker compose -f docker-compose.prod.yml --env-file .env.prod down
#
# Requires .env.prod file — see .env.prod.example
# NOTE: Always pass --env-file .env.prod so ${VAR} interpolation reads
#       from the correct file (not the default .env).

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgresql:
    image: postgres:16-alpine
    container_name: openmath-local-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    volumes:
      - openmath-local-prod-pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    # ⚠️  DEV-ONLY: expose DB to host for pgAdmin. See docs/NOTE_dev_db_port.md
    ports:
      - "5433:5432"
    networks:
      - openmath-local-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python FastAPI Backend ─────────────────────────────────
  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    image: openmath/python-api:latest
    container_name: openmath-local-prod-api
    restart: unless-stopped
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quiz}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB:-quiz}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      DEBUG: "false"
    networks:
      - openmath-local-prod-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Angular Frontend (nginx) ───────────────────────────────
  angular-app:
    build:
      context: ./angular-app
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.0.0}
    image: openmath/angular-app:latest
    container_name: openmath-local-prod-frontend
    restart: unless-stopped
    depends_on:
      python-api:
        condition: service_healthy
    ports:
      - "${PUBLIC_PORT:-80}:80"
    networks:
      - openmath-local-prod-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  openmath-local-prod-pgdata:

networks:
  openmath-local-prod-net:
    driver: bridge
